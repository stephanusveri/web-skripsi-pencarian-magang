<!-- login.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Magang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            
            <div id="error-message" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
            
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <button type="submit" 
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
                    Login
                </button>
            </form>
            
            <p class="mt-4 text-center text-gray-600">
                Belum punya akun? 
                <a href="register.html" class="text-blue-500 hover:underline">Register</a>
            </p>
            
            <div class="mt-6 pt-6 border-t">
                <p class="text-sm text-gray-500 mb-2">Test Accounts:</p>
                <div class="text-xs text-gray-600 space-y-1">
                    <p>Admin: admin@test.com / admin123</p>
                    <p>Perusahaan: pt.tech@test.com / perusahaan123</p>
                    <p>Mahasiswa: john@student.com / mahasiswa123</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // NO NEED TO DECLARE API_URL - use directly
        const apiUrl = 'http://localhost:5000/api';
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch(`${apiUrl}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Login gagal');
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Redirect based on role
                switch(data.user.role) {
                    case 'ADMIN':
                        window.location.href = 'admin/dashboard.html';
                        break;
                    case 'MAHASISWA':
                        window.location.href = 'mahasiswa/dashboard.html';
                        break;
                    case 'PERUSAHAAN':
                        window.location.href = 'perusahaan/dashboard.html';
                        break;
                    default:
                        throw new Error('Invalid role');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
