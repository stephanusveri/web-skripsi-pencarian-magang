    <div class="max-w-4xl mx-auto px-4 py-8 mt-20">
        <h2 class="text-2xl font-bold mb-6">Profile Saya</h2>

        <div class="bg-white rounded-lg shadow p-6">
            <form id="profile-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 mb-2">NIM</label>
                        <input type="text" id="nim"  readonly class="w-full px-4 py-2 border rounded bg-gray-100">
                    </div>

                    <div>
                          <label class="block text-gray-700 mb-2">Nama Lengkap *</label>
                        <input type="text" id="nama" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                          <label class="block text-gray-700 mb-2">Jurusan *</label>
                        <input type="text" id="jurusan" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                          <label class="block text-gray-700 mb-2">Semester *</label>
                        <input type="number" id="semester" min="1" max="14" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-gray-700 mb-2">Link CV</label>
                    <input type="url" id="cv" placeholder="https://..."
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">Upload CV ke Google Drive/Dropbox dan paste linknya</p>
                </div>

                <div class="mt-4">
                    <label class="block text-gray-700 mb-2">Link Transkrip</label>
                    <input type="url" id="transkrip" placeholder="https://..."
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">Upload transkrip ke Google Drive/Dropbox dan paste linknya</p>
                </div>

                <div class="mt-4">
                    <label class="block text-gray-700 mb-2">Link Foto</label>
                    <input type="url" id="foto" placeholder="https://..."
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">Upload foto ke Google Drive/Dropbox dan paste linknya</p>
                </div>

                <div class="mt-6 flex gap-4">
                    <button type="submit" 
                        class="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                        Simpan Perubahan
                    </button>
                    <button type="button" onclick="loadProfile()"
                        class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                        Reset
                    </button>
                </div>
            </form>
        </div>
    </div>

        // loadProfile();
        const user = initCommon('MAHASISWA');

        function loadProfile() {
            const mahasiswa = user.mahasiswa;

            document.getElementById('nim').value = mahasiswa.nim || '';
            document.getElementById('nama').value = mahasiswa.nama || '';
            document.getElementById('jurusan').value = mahasiswa.jurusan || '';
            document.getElementById('semester').value = mahasiswa.semester || '';
            document.getElementById('cv').value = mahasiswa.cv || '';
            document.getElementById('transkrip').value = mahasiswa.transkrip || '';
            document.getElementById('foto').value = mahasiswa.foto || '';
        }

        function swalCountdown(options, seconds = 3) {
            return Swal.fire({
                ...options,
                timer: seconds * 1000,
                timerProgressBar: true,
            });
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                nama: document.getElementById('nama').value,
                jurusan: document.getElementById('jurusan').value,
                semester: parseInt(document.getElementById('semester').value),
                cv: document.getElementById('cv').value || null,
                transkrip: document.getElementById('transkrip').value || null,
                foto: document.getElementById('foto').value || null 
            };

            try {
                const updatedMahasiswa = await apiPut('/mahasiswa/profile', data);

                // Update local storage
                user.mahasiswa = updatedMahasiswa;
                localStorage.setItem('user', JSON.stringify(user));

                // showToast('Profile berhasil diupdate!', 'success');
                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Perusahaan berhasil diupdate',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
            } catch (error) {
                // showToast('Error: ' + error.message, 'error');
                Swal.swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4);
            }
        });

        loadProfile();
