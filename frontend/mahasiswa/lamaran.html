        // fetchLamaran();
        const user = initCommon('MAHASISWA');
        let allLamaran = [];

        async function fetchLamaran() {
            try {
                showLoading('lamaran-list');
                allLamaran = await apiGet('/mahasiswa/lamaran');
                displayLamaran(allLamaran);
            } catch (error) {
                console.error('Error:', error);
                showError('lamaran-list', 'Gagal memuat data lamaran');
            }
        }

        function displayLamaran(lamaran) {
            const container = document.getElementById('lamaran-list');

            if (lamaran.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center">
                        <p class="text-gray-500 mb-4">Belum ada lamaran</p>
                        <a href="lowongan.html" class="text-blue-600 hover:underline">
                            Cari lowongan sekarang →
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = lamaran.map(item => `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-2">${item.lowongan.judul}</h3>
                            <p class="text-gray-600 mb-1">${item.lowongan.perusahaan.namaPerusahaan}</p>
                            <p class="text-sm text-gray-500">
                                📍 ${item.lowongan.lokasi} • ⏱️ ${item.lowongan.durasi}
                            </p>
                        </div>
                        <span class="px-4 py-2 rounded font-semibold ${getStatusClass(item.status)}">
                            ${item.status}
                        </span>
                    </div>

                    <div class="border-t pt-4 mt-4">
                        <p class="text-sm text-gray-600 mb-2">
                            <strong>Tanggal Lamar:</strong> ${formatDate(item.tanggalLamar)}
                        </p>
                        
                        ${item.catatan ? `
                            <div class="mt-3 p-3 bg-gray-50 rounded">
                                <p class="text-sm text-gray-700">
                                    <strong>Catatan:</strong> ${item.catatan}
                                </p>
                            </div>
                        ` : ''}

                        <div class="mt-4">
                            <button onclick="viewDetail('${item.id}')" 
                                class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                Lihat Detail
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('filter-status').addEventListener('change', (e) => {
            const status = e.target.value;
            const filtered = status ? allLamaran.filter(l => l.status === status) : allLamaran;
            displayLamaran(filtered);
        });

        function viewDetail(id) {
            const lamaran = allLamaran.find(l => l.id === id);
            if (!lamaran) return;
            
            alert(`Detail Lamaran:
            Lowongan: ${lamaran.lowongan.judul}
            Perusahaan: ${lamaran.lowongan.perusahaan.namaPerusahaan}
            Status: ${lamaran.status}
            Tanggal Lamar: ${formatDate(lamaran.tanggalLamar)}

            ${lamaran.catatan ? 'Catatan: ' + lamaran.catatan : ''}`);
        }

        fetchLamaran();
