<!-- lamaran.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamaran Saya</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navbar -->
    <nav id="main-nav" class="bg-white shadow fixed top-0 left-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold truncate">Portal Admin</h1>
            <div class="hidden md:flex items-center space-x-4 flex-wrap">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
                <a href="lowongan.html" class="text-blue-600 hover:underline">Cari Lowongan</a>
                <a href="lamaran.html" class="text-blue-600 hover:underline">Lamaran Saya</a>
                <a href="profile.html" class="text-blue-600 hover:underline">Profile</a>
                <a href="history.html" class="text-blue-600 hover:underline">History Magang</a>
                <button id="logout-btn" class="text-red-600 hover:underline">Logout</button>
            </div>
            <!-- Hamburger Button -->
            <button id="hamburger-btn" class="md:hidden flex flex-col justify-center items-center w-9 h-9 rounded-lg hover:bg-gray-100 focus:outline-none transition-colors" aria-label="Toggle menu">
                <i id="menu-icon" class="ri-menu-line text-2xl text-gray-700"></i>
            </button>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobile-menu" class="hidden-menu md:hidden bg-white border-t border-gray-100 px-4 py-3 flex flex-col space-y-3 absolute w-full shadow-lg">
            <a href="dashboard.html" class="text-blue-600 hover:underline text-sm py-1">Dashboard</a>
            <a href="lowongan.html" class="text-blue-600 hover:underline text-sm py-1">Cari Lowongan</a>
            <a href="lamaran.html" class="text-blue-600 hover:underline text-sm py-1">Lamaran Saya</a>
            <a href="profile.html" class="text-blue-600 hover:underline text-sm py-1">Profile</a>
            <a href="history.html" class="text-blue-600 hover:underline text-sm py-1">History Magang</a>
            <button id="logout-btn-mobile" class="text-red-600 hover:underline text-sm text-left py-1">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 mt-20">
        <h2 class="text-2xl font-bold mb-6">Riwayat Lamaran</h2>
        <!-- FILTER -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex gap-4">
                <select id="filter-status" class="px-4 py-2 border rounded focus: outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Semua Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="DITERIMA">Diterima</option>
                    <option value="DITOLAK">Ditolak</option>
                </select>
            </div>
        </div>

        <div id="lamaran-list" class="space-y-4">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Modal detail lamaran -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-2xl font-bold text-gray-900" id="detail-title"></h3>
                        <p class="text-gray-600 mt-1" id="detail-company"></p>
                    </div>
                    <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="mb-6">
                    <span id="detail-status-badge" class="px-4 py-2 rounded-full text-sm font-medium"></span>
                </div>

                <div class="space-y-6">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center">
                            <span class="mr-2"></span>
                            Informasi Lamaran
                        </h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-600">Tanggal Melamar</p>
                                <p class="font-medium" id="detail-tanggal"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Status</p>
                                <p class="font-medium" id="detail-status-text"></p>
                            </div>
                        </div>
                    </div>

                    <div class="border rounded-lg p-4">
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center">
                            <span class="mr-2"></span>
                            Dokumen & Portfolio
                        </h4>
                        <div id="detail-documents" class="space-y-2">
                            <!-- populate dari JS -->
                        </div>
                    </div>

                    <div class="border-t pt-4">
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center">
                            <span class="mr-2"></span>
                            Detail Lowongan
                        </h4>
                        <div id="detail-lowongan-info" class="space-y-3">
                            <!-- populate dari JS -->
                        </div>
                    </div>
                </div>

                <div class="mt-6 pt-6 border-t flex gap-3">
                    <button onclick="closeDetailModal()" class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        Tutup
                    </button>
                    <button onclick="withdrawApplication()" id="withdraw-btn" class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        Batalkan Lamaran
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        let menuOpen = false;

        hamburgerBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden-menu');
                mobileMenu.classList.add('show-menu');
                menuIcon.className = 'ri-close-line text-2xl text-gray-700';
            } else {
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700'
            }
        });

        document.addEventListener('click', (e) => {
            if (menuOpen && !hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                menuOpen = false;
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700';
            }
        });

        const user = initCommon('MAHASISWA');
        let allLamaran = [];
        let currentLamaranId = null;

        async function fetchLamaran() {
            try {
                showLoading('lamaran-list');
                allLamaran = await apiGet('/mahasiswa/lamaran');
                displayLamaran(allLamaran);
            } catch (error) {
                console.error('Error:', error);
                showError('lamaran-list', 'Gagal memuat data lamaran');
            }
        }

        function displayLamaran(lamaran) {
            const container = document.getElementById('lamaran-list');

            if (lamaran.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center">
                        <p class="text-gray-500 mb-4">Belum ada lamaran</p>
                        <a href="lowongan.html" class="text-blue-600 hover:underline">
                            Cari lowongan sekarang →
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = lamaran.map(item => `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-2">${item.lowongan.judul}</h3>
                            <p class="text-gray-600 mb-1">${item.lowongan.perusahaan.namaPerusahaan}</p>
                            <p class="text-sm text-gray-500">
                                ${item.lowongan.lokasi} • ${item.lowongan.durasi}
                            </p>
                        </div>
                        <span class="px-4 py-2 rounded font-semibold ${getStatusClass(item.status)}">
                            ${item.status}
                        </span>
                    </div>

                    <div class="border-t pt-4 mt-4">
                        <p class="text-sm text-gray-600 mb-2">
                            <strong>Tanggal Lamar:</strong> ${formatDate(item.tanggalLamar)}
                        </p>

                        <div class="mt-4">
                            <button onclick="viewDetail('${item.id}')" 
                                class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                Lihat Detail
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('filter-status').addEventListener('change', (e) => {
            const status = e.target.value;
            const filtered = status ? allLamaran.filter(l => l.status === status) : allLamaran;
            displayLamaran(filtered);
        });

        function viewDetail(id) {
            const lamaran = allLamaran.find(l => l.id === id);
            if (!lamaran) return;

            currentLamaranId = id;
            
            document.getElementById('detail-title').textContent = lamaran.lowongan.judul;
            document.getElementById('detail-company').textContent = lamaran.lowongan.perusahaan.namaPerusahaan;

            const statusBadge = document.getElementById('detail-status-badge');
            const statusClasses = {
                'PENDING': 'bg-yellow-100 text-yellow-700',
                'DITERIMA': 'bg-green-100 text-green-700',
                "DITOLAK" : 'bg-red-100 text-red-700'
            };
            statusBadge.className = `px-4 py-2 rounded-full text-sm font-medium ${statusClasses[lamaran.status]}`;
            statusBadge.textContent = lamaran.status;

            document.getElementById('detail-tanggal').textContent = new Date(lamaran.tanggalLamar).toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            document.getElementById('detail-status-text').textContent = lamaran.status;

            const docsContainer = document.getElementById('detail-documents');
            let docsHTML = '';

            if (lamaran.cvLink) {
                docsHTML += `
                    <a href="${lamaran.cvLink}" target="_blank" 
                    class="flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span>CV (PDF)</span>
                    </a>
                `;
            }

            if (lamaran.cvFileName) {
                docsHTML += `
                    <a href="${API_URL.replace('/api', '')}/uploads/cv/${lamaran.cvFileName}" 
                    class="flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span>CV Uploaded: ${lamaran.cvFileName}</span>
                    </a>
                `;
            }

            if (lamaran.portfolioLink) {
                docsHTML += `
                        <a href="${lamaran.portfolioLink}" target="_blank" 
                        class="flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                            <span>Portfolio</span>
                        </a>
                    `;
            }
        
            if (lamaran.linkedinLink) {
                docsHTML += `
                    <a href="${lamaran.linkedinLink}" target="_blank" 
                    class="flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        <span>LinkedIn Profile</span>
                    </a>
                `;
            }
            
            if (lamaran.resumeLink) {
                docsHTML += `
                    <a href="${lamaran.resumeLink}" target="_blank" 
                    class="flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                        <span>Resume / Dokumen Tambahan</span>
                    </a>
                `;
            }
            
            if (!docsHTML) {
                docsHTML = '<p class="text-gray-500">Tidak ada dokumen</p>';
            }
            
            docsContainer.innerHTML = docsHTML;

            const lowonganInfo = document.getElementById('detail-lowongan-info');
            lowonganInfo.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-sm text-gray-600">Lokasi</p>
                        <p class="font-medium">${lamaran.lowongan.lokasi}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600">Durasi</p>
                        <p class="font-medium">${lamaran.lowongan.durasi}</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600">Kuota</p>
                        <p class="font-medium">${lamaran.lowongan.kuota} orang</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600">Status Lowongan</p>
                        <p class="font-medium">
                            <span class="px-2 py-1 rounded text-xs ${lamaran.lowongan.status === 'BUKA' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${lamaran.lowongan.status}
                            </span>
                        </p>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t">
                    <p class="text-sm text-gray-600 mb-1">Deskripsi</p>
                    <p class="text-gray-700">${lamaran.lowongan.deskripsi}</p>
                </div>
            `;

            const withdrawBtn = document.getElementById('withdraw-btn');
            if (lamaran.status === 'PENDING') {
                withdrawBtn.classList.remove('hidden');
            } else {
                withdrawBtn.classList.add('hidden');
            }

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            currentLamaranId = null;
        }

        async function withdrawApplication() {
            // if (!confirm('Yakin ingin membatalkan lamaran?')) return;

            const result = await Swal.fire({
                icon: 'warning',
                title: 'Konfirmasi Pembatalan',
                text: 'Yakin ingin membatalkan lamaran?',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Hapus',
                cancelButtonText: 'Batal'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch (`${API_URL}/mahasiswa/lamaran/${currentLamaranId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if(!response.ok) throw new Error ('Gagal membatalkan lamaran');

                // alert('Lamaran berhasil dibatalkan');
                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Lamaran berhasil dibatalkan',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
                closeDetailModal();
                fetchLamaran();
            } catch (error) {
                // alert('Error: ' + error.message);
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4)
            }
        }

        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') {
                closeDetailModal();
            }
        });

        fetchLamaran();
    </script>
</body>
</html>
