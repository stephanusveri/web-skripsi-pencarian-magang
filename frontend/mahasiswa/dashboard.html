        // Initialize and check auth
        const user = initCommon('MAHASISWA');
        
        if (!user || !user.mahasiswa) {
            logout();
        }

        // Display nama mahasiswa
        document.getElementById('nama-mahasiswa').textContent = user.mahasiswa.nama;

        // Fetch dashboard data
        async function fetchDashboardData() {
            try {
                showLoading('recent-lamaran');
                
                const lamaran = await apiGet('/mahasiswa/lamaran');
                
                // Update stats
                document.getElementById('total-lamaran').textContent = lamaran.length;
                document.getElementById('total-diterima').textContent = 
                    lamaran.filter(l => l.status === 'DITERIMA').length;
                document.getElementById('total-pending').textContent = 
                    lamaran.filter(l => l.status === 'PENDING').length;
                
                // Display recent applications
                const recentDiv = document.getElementById('recent-lamaran');
                if (lamaran.length === 0) {
                    recentDiv.innerHTML = '<p class="text-gray-500">Belum ada lamaran</p>';
                } else {
                    recentDiv.innerHTML = lamaran.slice(0, 5).map(item => `
                        <div class="border-b pb-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-semibold">${item.lowongan.judul}</h4>
                                    <p class="text-gray-600">${item.lowongan.perusahaan.namaPerusahaan}</p>
                                    <p class="text-sm text-gray-500">
                                        Tanggal Lamar: ${formatDate(item.tanggalLamar)}
                                    </p>
                                </div>
                                <span class="px-3 py-1 rounded text-sm ${getStatusClass(item.status)}">
                                    ${item.status}
                                </span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                showError('recent-lamaran', 'Gagal memuat data. Silakan refresh halaman.');
            }
        }

        fetchDashboardData();
