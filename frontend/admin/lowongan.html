<!-- admin/lowongan.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Lowongan</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/sweetalert2.min.css">
    <script src="../assets/js/sweetalert2.all.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com plugins=line-clamp"></script>
</head>
<body class="bg-gray-100">
    <nav id="main-nav" class="bg-white shadow fixed top-0 left-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold truncate">Portal Admin</h1>
            <div class="hidden md:flex items-center space-x-4 flex-wrap">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
                <a href="perusahaan.html" class="text-blue-600 hover:underline">Perusahaan</a>
                <a href="mahasiswa.html" class="text-blue-600 hover:underline">Mahasiswa</a>
                <a href="lowongan.html" class="text-blue-600 hover:underline">Lowongan</a>
                <a href="history.html" class="text-blue-600 hover:underline">History</a>
                <button id="logout-btn" class="text-red-600 hover:underline">Logout</button>
            </div>
            <!-- Hamburger Button -->
            <button id="hamburger-btn" class="md:hidden flex flex-col justify-center items-center w-9 h-9 rounded-lg hover:bg-gray-100 focus:outline-none transition-colors" aria-label="Toggle menu">
                <i id="menu-icon" class="ri-menu-line text-2xl text-gray-700"></i>
            </button>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobile-menu" class="hidden-menu md:hidden bg-white border-t border-gray-100 px-4 py-3 flex flex-col space-y-3 absolute w-full shadow-lg">
            <a href="dashboard.html" class="text-blue-600 hover:underline text-sm py-1">Dashboard</a>
            <a href="perusahaan.html" class="text-blue-600 hover:underline text-sm py-1">Perusahaan</a>
            <a href="mahasiswa.html" class="text-blue-600 hover:underline text-sm py-1">Mahasiswa</a>
            <a href="lowongan.html" class="text-blue-600 hover:underline text-sm py-1">Lowongan</a>
            <a href="history.html" class="text-blue-600 hover:underline text-sm py-1">History</a>
            <button id="logout-btn-mobile" class="text-red-600 hover:underline text-sm text-left py-1">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 mt-16">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-5">
            <h2 class="text-xl font-bold">Kelola Lowongan Magang</h2>
            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                <input type="text" id="search" placeholder="Cari lowongan..." 
                    class="px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-60 text-sm">
                <select id="filter-status" 
                    class="px-3 py-1.5 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-48 text-xs sm:text-sm">
                    <option value="">Semua Status</option>
                    <option value="BUKA">Buka</option>
                    <option value="TUTUP">Tutup</option>
                </select>
            </div>
        </div>

        <div id="lowongan-list" class="space-y-4"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto pt-6 px-4 pb-4 md:p-6">
            <div class="flex justify-between items-center mb-6 pt-3 border-b">
                <h3 class="text-2xl font-bold">Detail Lowongan</h3>
                <button id="close-modal" class="text-3xl font-bold text-gray-500 hover:text-gray-700 p-2">&times;</button>
            </div>

            <div id="modal-content"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        let menuOpen = false;

        hamburgerBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden-menu');
                mobileMenu.classList.add('show-menu');
                menuIcon.className = 'ri-close-line text-2xl text-gray-700';
            } else {
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700'
            }
        });

        document.addEventListener('click', (e) => {
            if (menuOpen && !hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                menuOpen = false;
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700';
            }
        });
        
        const user = initCommon('ADMIN');
        let allLowongan = [];

        async function fetchLowongan() {
            try {
                const response = await fetch (`${API_URL}/lowongan`);
                allLowongan = await response.json();
                displayLowongan(allLowongan);
            } catch (error) {
            console.error('Error:', error);
            } 
        }

        function displayLowongan(lowongan) {
            const container = document.getElementById('lowongan-list');

            if (lowongan.length === 0){
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
                        Tidak ada lowongan
                    </div>
                `;
                return;
            }

            container.innerHTML = lowongan.map(item => `
                <div class="bg-white rounded-lg shadow p-4 md:p-6">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-3 mb-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-2">${item.judul}</h3>
                            <p class="text-gray-700 mb-2 line-clamp-2">${item.deskripsi}</p>
                            <div class="flex flex-wrap gap-2 text-sm text-gray-600 mb-2">
                                <span class="bg-gray-100 px-2 py-1 rounded">${item.perusahaan.namaPerusahaan}</span>
                                <span class="bg-gray-100 px-2 py-1 rounded">${item.lokasi}</span>
                                <span class="bg-gray-100 px-2 py-1 rounded">${item.durasi}</span>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-2">
                                <span class="text-sm px-2 py-1 bg-blue-100 text-blue-700 rounded">
                                    ${item._count.lamaran}/${item.kuota} Pelamar
                                </span>
                                <span class="text-sm text-gray-500">
                                    ${new Date(item.tanggalMulai).toLocaleDateString('id-ID')} - 
                                    ${new Date(item.tanggalSelesai).toLocaleDateString('id-ID')}
                                </span>
                            </div>
                        </div>
                        <span class="px-3 py-1 rounded ${
                            item.status === 'BUKA' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                        }">
                            ${item.status}
                        </span>
                    </div>
                    <div class="grid grid-cols-3 gap-1 md:flex md:gap-3 mt-3">
                        <button onclick="viewDetail('${item.id}')" 
                            class="w-full md:w-auto px-2 py-1 text-xs md:px-4 md:py-2 md:text-sm bg-blue-500 text-white rounded hover:bg-blue-600">
                            Detail
                        </button>
                        <button onclick="updateStatus('${item.id}', '${item.status === 'BUKA' ? 'TUTUP' : 'BUKA'}')" 
                            class="w-full md:w-auto px-2 py-1 text-xs md:px-4 md:py-2 md:text-sm bg-yellow-500 text-white rounded hover:bg-yellow-600">
                            ${item.status === 'BUKA' ? 'Tutup' : 'Buka'}
                        </button>
                        <button onclick="deleteLowongan('${item.id}')" 
                            class="w-full md:w-auto px-2 py-1 text-xs md:px-4 md:py-2 md:text-sm bg-red-500 text-white rounded hover:bg-red-600">
                            Hapus
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function viewDetail(id){
            const lowongan = allLowongan.find(l => l.id === id);
            if (!lowongan) return;

            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-5">
                    <div>
                        <h4 class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="ri-building-line text-blue-500"></i> 
                            Perusahaan</h4>
                        <p class="text-lg">${lowongan.perusahaan.namaPerusahaan}</p>
                        <p class="text-sm text-gray-600 flex items-center gap-1">
                            <i class="ri-map-pin-line"></i>
                            ${lowongan.perusahaan.alamat}</p>
                    </div>

                    <div>
                        <h4 class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="ri-file-text-line text-blue-500"></i>
                            Deskripsi</h4>
                        <p class="text-gray-700">${lowongan.deskripsi}</p>
                    </div>

                    <div>
                        <h4 class="font-semibold text-gray-700 flex items-center gap-2">
                            <i class="ri-checkbox-circle-line text-blue-500"></i>
                            Persyaratan</h4>
                        <p class="text-gray-700 whitespace-pre-wrap">${lowongan.persyaratan}</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h4 class="font-semibold text-gray-700">Lokasi</h4>
                            <p>${lowongan.lokasi}</p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-700">Durasi</h4>
                            <p>${lowongan.durasi}</p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-700">Kuota</h4>
                            <p>${lowongan.kuota} orang</p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-700">Pelamar</h4>
                            <p>${lowongan._count.lamaran} orang</p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-700">Periode Pendaftaran</h4>
                            <p class="text-sm">
                                ${new Date(lowongan.tanggalMulai).toLocaleDateString('id-ID')} - 
                                ${new Date(lowongan.tanggalSelesai).toLocaleDateString('id-ID')}
                            </p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-700">Status</h4>
                            <span class="px-2 py-1 rounded ${
                                lowongan.status === 'BUKA' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                            }">
                                ${lowongan.status}
                            </span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('detail-modal').classList.add('hidden');
        });
        
        function swalCountdown(options, seconds = 3) {
            return Swal.fire({
                ...options,
                timer: seconds * 1000,
                timerProgressBar: true,
            });
        }

        async function updateStatus(id, newStatus) {
            // if (!confirm(`Yakin ${newStatus === 'BUKA' ? 'membuka' : 'menutup'} lowongan ini?`)) return;

            const result = await Swal.fire({
                icon: 'warning',
                title: 'Konfirmasi',
                text: `Yakin ${newStatus === 'BUKA' ? 'membuka' : 'menutup'} lowongan ini?`,
                showCancelButton: true,
                confirmButtonColor: newStatus === 'BUKA' ? '#3085D6' : '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Ya',
                cancelButtonText: 'Batal'
            });

            if (!result.isConfirmed) return;

            try {
                await fetch(`${API_URL}/lowongan/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                // alert('Status berhasil diupdate');
                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Status lowongan berhasil diupdate',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
                fetchLowongan();
            } catch (error) {
                // alert('Error: ' + error.message);
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4);
            }
        }

        async function deleteLowongan(id) {
            // if (!confirm('Yakin hapus lowongan ini? Semua lamaran akan ikut terhapus!')) return;
            const result = await Swal.fire({
                icon: 'warning',
                title: 'Konfirmasi Hapus',
                text: 'Yakin hapus lowongan ini? Semua lamaran akan ikut terhapus!',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Ya, Hapus',
                cancelButtonText: 'Batal'
            });

            if (!result.isConfirmed) return;

            try {
                await fetch(`${API_URL}/lowongan/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Lowongan berhasil dihapus',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
                fetchLowongan();
            } catch (error) {
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4)
            }
        }

        // Search & Filter
        document.getElementById('search').addEventListener('input', filterLowongan);
        document.getElementById('filter-status').addEventListener('change', filterLowongan);

        function filterLowongan() {
            const search = document.getElementById('search').value.toLowerCase();
            const status = document.getElementById('filter-status').value;

            const filtered = allLowongan.filter(item => {
                const matchSearch = 
                    item.judul.toLowerCase().includes(search) ||
                    item.perusahaan.namaPerusahaan.toLowerCase().includes(search) ||
                    item.lokasi.toLowerCase().includes(search);
                const matchStatus = !status || item.status === status;
                return matchSearch && matchStatus;
            });

            displayLowongan(filtered);
        }

        fetchLowongan();
    </script>
</body>
</html>
