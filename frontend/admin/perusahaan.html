    <!-- Modal form tambah/edit -->
    <div id="form-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center p-4 overflow-y-auto z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full p-5 sm:p-6 my-8">
            <div class="flex justify-between items-center mb-4">
                <h3 id="form-title" class="text-xl sm:text-2xl font-bold">Tambah Perusahaan</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>

            <form id="perusahaan-form">
                <input type="hidden" id="perusahaan-id">

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm mb-1">Email *</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div class="mb-4" id="password-field">
                    <label class="block text-gray-700 text-sm mb-1">Password *<span id="password-hint" class="text-xs text-gray-400">(Kosongkan jika tidak ingin mengubah)</span></label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm mb-1">Nama Perusahaan *</label>
                    <input type="text" id="namaPerusahaan" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm mb-1">Alamat *</label>
                    <textarea id="alamat" rows="3" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm mb-1">Telepon *</label>
                    <input type="tel" id="telepon" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm mb-1">Website</label>
                    <input type="url" id="website" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <button class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 text-sm">
                    Simpan
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Detail Perusahaan -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center p-4 overflow-y-auto z-50">
        <div class="bg-white rounded-lg max-w-3xl w-full p-5 sm:p-6 my-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl sm:text-2xl font-bold">Detail Perusahaan</h3>
                <button id="close-detail-modal" class="text-3xl font-bold text-gray-500 hover:text-gray-700 text-3xl leading-none">&times;</button>
            </div>

            <div id="detail-content" class="space-y-4">
                <!-- loading state -->
                <div class="text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
                    <p class="mt-4 text-gray-600">Memuat data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        let menuOpen = false;

        hamburgerBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden-menu');
                mobileMenu.classList.add('show-menu');
                menuIcon.className = 'ri-close-line text-2xl text-gray-700';
            } else {
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700'
            }
        });

        document.addEventListener('click', (e) => {
            if (menuOpen && !hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                menuOpen = false;
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700';
            }
        });

        const user = initCommon('ADMIN');
        let isEditMode = false;
        let currentEditId = null;

        async function fetchPerusahaan() {
            try {
                const response = await fetch(`${API_URL}/admin/perusahaan`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                displayPerusahaan(data);
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal memuat data perusahaan');
            }
        }

        async function viewPerusahaan(id) {
            document.getElementById('detail-modal').classList.remove('hidden');

            document.getElementById('detail-content').innerHTML = `
                <div class="text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
                    <p class="mt-4 text-gray-600">Memuat data...</p>
                </div>
            `;

            try {
                const res = await fetch(`${API_URL}/admin/perusahaan/${id}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (!res.ok) throw new Error('Gagal mengambil data');

                const data = await res.json();
                displayDetail(data);
            } catch (error) {
                document.getElementById('detail-content').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-red-600">Gagal memuat data perusahaan</p>
                        <p class="text-gray-500 text-sm mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        function displayDetail(data) {
            const createdDate = new Date(data.createdAt).toLocaleDateString('id-ID', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            document.getElementById('detail-content').innerHTML = `
                <!-- Header Info -->
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 text-white p-6 rounded-lg">
                    <h4 class="text-2xl font-bold mb-2">${data.namaPerusahaan}</h4>
                    <p class="opacity-90">Terdaftar sejak ${createdDate}</p>
                </div>

                <!-- Informasi Kontak -->
                <div class="border rounded-lg p-6">
                    <h5 class="text-lg font-semibold mb-4 flex items-center">
                        Informasi Kontak
                    </h5>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm text-gray-500">Email</label>
                            <p class="font-medium">${data.email}</p>
                        </div>
                        <div>
                            <label class="text-sm text-gray-500">Telepon</label>
                            <p class="font-medium">${data.telepon || '-'}</p>
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-sm text-gray-500">Website</label>
                            <p class="font-medium">
                                ${data.website ? `<a href="${data.website}" target="_blank" class="text-blue-600 hover:underline">${data.website}</a>` : '-'}
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Alamat -->
                <div class="border rounded-lg p-6">
                    <h5 class="text-lg font-semibold mb-4 flex items-center">
                        Alamat
                    </h5>
                    <p class="text-gray-700">${data.alamat}</p>
                </div>

                <!-- Statistik -->
                <div class="border rounded-lg p-6">
                    <h5 class="text-lg font-semibold mb-4 flex items-center">
                        Statistik
                    </h5>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-blue-50 p-4 rounded text-center">
                            <p class="text-2xl font-bold text-blue-600">${data._count?.lowongan || 0}</p>
                            <p class="text-sm text-gray-600">Total Lowongan</p>
                        </div>
                        <div class="bg-green-50 p-4 rounded text-center">
                            <p class="text-2xl font-bold text-green-600">${data._count?.lamaran || 0}</p>
                            <p class="text-sm text-gray-600">Total Lamaran</p>
                        </div>
                        <div class="bg-yellow-50 p-4 rounded text-center">
                            <p class="text-2xl font-bold text-yellow-600">${data.lowonganAktif || 0}</p>
                            <p class="text-sm text-gray-600">Lowongan Aktif</p>
                        </div>
                        <div class="bg-purple-50 p-4 rounded text-center">
                            <p class="text-2xl font-bold text-purple-600">${data.mahasiswaDiterima || 0}</p>
                            <p class="text-sm text-gray-600">Mahasiswa Diterima</p>
                        </div>
                    </div>
                </div>

                <!-- Lowongan Terbaru (jika ada) -->
                ${data.lowongan && data.lowongan.length > 0 ? `
                    <div class="border rounded-lg p-6">
                        <h5 class="text-lg font-semibold mb-4 flex items-center">
                            Lowongan Terbaru
                        </h5>
                        <div class="space-y-3">
                            ${data.lowongan.slice(0, 5).map(lowongan => `
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                                    <div>
                                        <p class="font-medium">${lowongan.judul}</p>
                                        <p class="text-sm text-gray-500">${lowongan.lokasi} • ${lowongan.durasi}</p>
                                    </div>
                                    <span class="px-3 py-1 rounded text-xs ${
                                        lowongan.status === 'BUKA' 
                                            ? 'bg-green-100 text-green-700' 
                                            : 'bg-red-100 text-red-700'
                                    }">
                                        ${lowongan.status}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <button onclick="editPerusahaan('${data.id}')" 
                        class="flex-1 bg-yellow-500 text-white py-2 px-4 rounded hover:bg-yellow-600">
                        Edit Data
                    </button>
                    <button onclick="deletePerusahaan('${data.id}')" 
                        class="flex-1 bg-red-500 text-white py-2 px-4 rounded hover:bg-red-600">
                        Hapus Perusahaan
                    </button>
                </div>
            `;
        }

        function displayPerusahaan(perusahaan) {
            const tbody = document.getElementById('perusahaan-table');
            
            if (perusahaan.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">Belum ada data</td></tr>';
                return;
            }

            tbody.innerHTML = perusahaan.map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">${item.namaPerusahaan}</td>
                    <td class="px-6 py-4">${item.email}</td>
                    <td class="px-6 py-4">${item.telepon}</td>
                    <td class="px-6 py-4">${item.alamat}</td>
                    <td class="px-6 py-4">
                        <button onclick="viewPerusahaan('${item.id}')" 
                            class="text-blue-600 hover:underline mr-2">Lihat</button>
                        <button onclick="deletePerusahaan('${item.id}')" 
                            class="text-red-600 hover:underline">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        async function editPerusahaan(id) {
            // close modal detail 
            document.getElementById('detail-modal').classList.add('hidden');

            // mode edit
            isEditMode = true;
            currentEditId = id;

            // update judul form
            document.getElementById('form-title').textContent = 'Edit Perusahaan';
            document.getElementById('password-hint').classList.remove('hidden');

            // get data perusahaan
            try {
                const res = await fetch(`${API_URL}/admin/perusahaan/${id}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (!res.ok) throw new Error('Gagal mengambil data');

                const data = await res.json();

                // isi form dengan data yang ada
                document.getElementById('perusahaan-id').value = data.id;
                document.getElementById('email').value = data.email;
                document.getElementById('password').value = '';
                document.getElementById('password').removeAttribute('required');
                document.getElementById('namaPerusahaan').value = data.namaPerusahaan;
                document.getElementById('alamat').value = data.alamat;
                document.getElementById('telepon').value = data.telepon || '';
                document.getElementById('website').value = data.website || '';

                document.getElementById('form-modal').classList.remove('hidden');

            } catch (error) {
                alert('Gagal memuat data perusahaan: ' + error.message);
            }
        }

        document.getElementById('add-btn').addEventListener('click', () => {
            isEditMode = false;
            currentEditId = null;
            document.getElementById('form-title').textContent = 'Tambah Perusahaan';
            document.getElementById('password-hint').classList.add('hidden');
            document.getElementById('password').setAttribute('required', 'required');
            document.getElementById('perusahaan-form').reset();
            document.getElementById('form-modal').classList.remove('hidden');
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('form-modal').classList.add('hidden');
        });

        document.getElementById('close-detail-modal').addEventListener('click', () => {
            document.getElementById('detail-modal').classList.add('hidden');
        });

        function swalCountdown(options, seconds = 3) {
            return Swal.fire({
                ...options,
                timer: seconds * 1000,
                timerProgressBar: true,
            });
        }

        document.getElementById('perusahaan-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                email: document.getElementById('email').value,
                // password: document.getElementById('password').value,
                // role: 'PERUSAHAAN',
                namaPerusahaan: document.getElementById('namaPerusahaan').value,
                alamat: document.getElementById('alamat').value,
                telepon: document.getElementById('telepon').value,
                website: document.getElementById('website').value
            };

            const passwordValue = document.getElementById('password').value;
            if (passwordValue || !isEditMode) {
                data.password = passwordValue;
            }

            // role hanya untuk mode add
            if (!isEditMode) {
                data.role = 'PERUSAHAAN';
            }

            try {
                const url = isEditMode 
                    ? `${API_URL}/admin/perusahaan/${currentEditId}`
                    : `${API_URL}/admin/perusahaan`;
                
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Gagal menyimpan data');
                }

                // alert(isEditMode ? 'Perusahaan berhasil diupdate!' : 'Perusahaan berhasil ditambahkan!');

                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: isEditMode ? 'Perusahaan berhasil diupdate' : 'Perusahaan berhasil ditambahkan',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
                document.getElementById('form-modal').classList.add('hidden');
                fetchPerusahaan();
            } catch (error) {
                // alert('Error: ' + error.message);
                Swal.swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4);
            }
        });

        async function deletePerusahaan(id) {
            // if (!confirm('Yakin hapus perusahaan ini? Semua data lowongan dan lamaran terkait juga akan terhapus.')) return;
            const result = await Swal.fire({
                icon: 'warning',
                title: 'Konfirmasi Hapus',
                text: 'Yakin hapus perusahaan ini? Semua data lowongan dan lamaran terkait juga akan terhapus.',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Hapus',
                cancelButtonText: 'Batal'
            });


            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/admin/perusahaan/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (!response.ok) throw new Error('Gagal menghapus perusahaan');

                // alert('Perusahaan berhasil dihapus');
                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Perusahaan berhasil dihapus',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);

                document.getElementById('detail-modal').classList.add('hidden');
                fetchPerusahaan();
            } catch (error) {
                // alert('Error: ' + error.message);
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4)
            }
        }

        fetchPerusahaan();
    </script>
</body>
