<!-- admin/mahasiswa.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">Portal Admin</h1>
            <div class="space-x-4">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
                <a href="perusahaan.html" class="text-blue-600 hover:underline">Perusahaan</a>
                <a href="mahasiswa.html" class="text-blue-600 hover:underline">Mahasiswa</a>
                <a href="lowongan.html" class="text-blue-600 hover:underline">Lowongan</a>
                <a href="history.html" class="text-blue-600 hover:underline">History</a>
                <button id="logout-btn" class="text-red-600 hover:underline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Kelola Mahasiswa</h2>
            <div class="flex gap-4">
                <input type="text" id="search" placeholder="Cari mahasiswa..." class="px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select name="" id="filter-jurusan" class="px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Semua Jurusan</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIM</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Jurusan</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Semester</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Lamaran</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Aksi</th>
                    </tr>
                </thead>
                <tbody id="mahasiswa-table" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>
    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-2xl font-bold">Detail Mahasiswa</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">✕</button>
            </div>
            
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
</body>
</html>
