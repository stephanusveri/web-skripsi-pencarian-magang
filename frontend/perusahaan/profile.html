<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Perusahaan</title>
    <link rel="stylesheet" href="../assets/css/sweetalert2.min.css">
    <script src="../assets/js/sweetalert2.all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow fixed top-0 left-0 w-full">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">Portal Perusahaan</h1>
            <div class="space-x-4">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
                <a href="lowongan.html" class="text-blue-600 hover:underline">Lowongan Saya</a>
                <a href="lamaran.html" class="text-blue-600 hover:underline">Lamaran Masuk</a>
                <a href="profile.html" class="text-blue-600 hover:underline">Profile</a>
                <button id="logout-btn" class="text-red-600 hover:underline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8 mt-20">
        <h2 class="text-2xl font-bold mb-6">Profile Perusahaan</h2>

        <div class="bg-white rounded-lg shadow p-6">
            <form id="profile-form">
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Nama Perusahaan *</label>
                    <input type="text" id="namaPerusahaan" required
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Alamat *</label>
                    <textarea id="alamat" rows="3" required
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-700 mb-2">Telepon *</label>
                        <input type="tel" id="telepon" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 mb-2">Email *</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Website</label>
                    <input type="url" id="website" placeholder="https://..."
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Deskripsi Perusahaan</label>
                    <textarea id="deskripsi" rows="4" placeholder="Ceritakan tentang perusahaan Anda..."
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="flex gap-4">
                    <button type="submit" 
                        class="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                        Simpan Perubahan
                    </button>
                    <button type="button" onclick="loadProfile()"
                        class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                        Reset
                    </button>
                </div>
            </form>
        </div>

        <!-- Statistics -->
        <div class="mt-8 bg-white rounded-lg shadow p-6">
            <h3 class="text-xl font-bold mb-4">Statistik</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="text-center p-4 bg-blue-50 rounded">
                    <p class="text-2xl font-bold text-blue-600" id="stat-lowongan">0</p>
                    <p class="text-gray-600">Total Lowongan</p>
                </div>
                <div class="text-center p-4 bg-green-50 rounded">
                    <p class="text-2xl font-bold text-green-600" id="stat-lamaran">0</p>
                    <p class="text-gray-600">Total Lamaran</p>
                </div>
                <div class="text-center p-4 bg-purple-50 rounded">
                    <p class="text-2xl font-bold text-purple-600" id="stat-diterima">0</p>
                    <p class="text-gray-600">Lamaran Diterima</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        checkAuth('PERUSAHAAN');
        document.getElementById('logout-btn').addEventListener('click', logout);

        async function loadProfile() {
            // const user = getUser();
            // const perusahaan = user.perusahaan;
            try {
                const res = await fetch(`${API_URL}/perusahaan/profile`, {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });

                if (!res.ok) throw new Error('Gagal memuat profile');
                
                const perusahaan = await res.json();
                console.log(perusahaan);

                document.getElementById('namaPerusahaan').value = perusahaan.namaPerusahaan;
                document.getElementById('alamat').value = perusahaan.alamat;
                document.getElementById('telepon').value = perusahaan.telepon;
                document.getElementById('email').value = perusahaan.email;
                document.getElementById('website').value = perusahaan.website || '';
                document.getElementById('deskripsi').value = perusahaan.deskripsi || '';
                // document.getElementById('logo').value = perusahaan.logo || '';

                // if (perusahaan.logo) {
                //     showLogoPreview(perusahaan.logo);
                // }

                 // update localStorage juga biar sinkron
                const user = getUser();
                user.perusahaan = perusahaan;
                localStorage.setItem('user', JSON.stringify(user));
            } catch (error) {
                alert(error.message);
            } 
        }
    

        // // Logo preview
        // document.getElementById('logo').addEventListener('input', (e) => {
        //     const url = e.target.value;
        //     if (url && isValidUrl(url)) {
        //         showLogoPreview(url);
        //     } else {
        //         hideLogoPreview();
        //     }
        // });

        // function showLogoPreview(url) {
        //     document.getElementById('logo-preview').classList.remove('hidden');
        //     document.getElementById('logo-img').src = url;
        // }

        // function hideLogoPreview() {
        //     document.getElementById('logo-preview').classList.add('hidden');
        // }

        // function isValidUrl(string) {
        //     try {
        //         new URL(string);
        //         return true;
        //     } catch (_) {
        //         return false;
        //     }
        // }

        function swalCountdown(options, seconds = 3) {
            return Swal.fire({
                ...options,
                timer: seconds * 1000,
                timerProgressBar: true,
            });
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                namaPerusahaan: document.getElementById('namaPerusahaan').value,
                alamat: document.getElementById('alamat').value,
                telepon: document.getElementById('telepon').value,
                email: document.getElementById('email').value,
                website: document.getElementById('website').value || null,
                deskripsi: document.getElementById('deskripsi').value || null,
                // logo: document.getElementById('logo').value || null
            };

            try {
                const response = await fetch(`${API_URL}/perusahaan/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message);
                }

                const updatedPerusahaan = await response.json();
                
                // Update localStorage
                const user = getUser();
                user.perusahaan = updatedPerusahaan;
                localStorage.setItem('user', JSON.stringify(user));

                // alert('Profile berhasil diupdate!');
                await swalCountdown({
                    icon: 'success',
                    title: 'Profile berhasil diupdate',
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
            } catch (error) {
                // alert('Error: ' + error.message);
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4);
            }
        });

        // Load statistics
        async function loadStatistics() {
            try {
                const [lowonganRes, lamaranRes] = await Promise.all([
                    fetch(`${API_URL}/perusahaan/lowongan`, {
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    }),
                    fetch(`${API_URL}/perusahaan/lamaran`, {
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    })
                ]);

                const lowongan = await lowonganRes.json();
                const lamaran = await lamaranRes.json();

                document.getElementById('stat-lowongan').textContent = lowongan.length;
                document.getElementById('stat-lamaran').textContent = lamaran.length;
                document.getElementById('stat-diterima').textContent = 
                    lamaran.filter(l => l.status === 'DITERIMA').length;
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        loadProfile();
        loadStatistics();
    </script>
</body>
</html>
