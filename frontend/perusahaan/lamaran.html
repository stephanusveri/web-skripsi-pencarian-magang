<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamaran Masuk</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/sweetalert2.min.css">
    <script src="../assets/js/sweetalert2.all.min.js"></script>
</head>
<body class="bg-gray-100">
    <!-- Navbar -->
    <nav id="main-nav" class="bg-white shadow fixed top-0 left-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold truncate">Portal Admin</h1>
            <div class="hidden md:flex items-center space-x-4 flex-wrap">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
                <a href="lowongan.html" class="text-blue-600 hover:underline"> Lowongan Saya</a>
                <a href="lamaran.html" class="text-blue-600 hover:underline">Lamaran Masuk</a>
                <a href="profile.html" class="text-blue-600 hover:underline">Profile</a>
                <button id="logout-btn" class="text-red-600 hover:underline">Logout</button>
            </div>
            <!-- Hamburger Button -->
            <button id="hamburger-btn" class="md:hidden flex flex-col justify-center items-center w-9 h-9 rounded-lg hover:bg-gray-100 focus:outline-none transition-colors" aria-label="Toggle menu">
                <i id="menu-icon" class="ri-menu-line text-2xl text-gray-700"></i>
            </button>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobile-menu" class="hidden-menu md:hidden bg-white border-t border-gray-100 px-4 py-3 flex flex-col space-y-3 absolute w-full shadow-lg">
            <a href="dashboard.html" class="text-blue-600 hover:underline text-sm py-1">Dashboard</a>
            <a href="lowongan.html" class="text-blue-600 hover:underline text-sm py-1">Lowongan Saya</a>
            <a href="lamaran.html" class="text-blue-600 hover:underline text-sm py-1">Lamaran Masuk</a>
            <a href="profile.html" class="text-blue-600 hover:underline text-sm py-1">Profile</a>
            <button id="logout-btn-mobile" class="text-red-600 hover:underline text-sm text-left py-1">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 mt-20">
        <h2 class="text-2xl font-bold mb-6">Lamaran Masuk</h2>

        <!-- Filter -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex gap-4">
                <select id="filter-lowongan" 
                    class="px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Semua Lowongan</option>
                </select>
                <select id="filter-status" 
                    class="px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Semua Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="DITERIMA">Diterima</option>
                    <option value="DITOLAK">Ditolak</option>
                </select>
            </div>
        </div>

        <div id="lamaran-list" class="space-y-4"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-2xl font-bold">Detail Lamaran</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>

            <div id="modal-content"></div>

            <div class="mt-6 flex gap-2">
                <button id="approve-btn" class="px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                    Terima
                </button>
                <button id="reject-btn" class="px-6 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                    Tolak
                </button>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        // ============================================
        // INITIALIZATION
        // ============================================
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        let menuOpen = false;

        hamburgerBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden-menu');
                mobileMenu.classList.add('show-menu');
                menuIcon.className = 'ri-close-line text-2xl text-gray-700';
            } else {
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700'
            }
        });

        document.addEventListener('click', (e) => {
            if (menuOpen && !hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                menuOpen = false;
                mobileMenu.classList.remove('show-menu');
                mobileMenu.classList.add('hidden-menu');
                menuIcon.className = 'ri-menu-line text-2xl text-gray-700';
            }
        });
        
        const user = initCommon('PERUSAHAAN');
        let allLamaran = [];
        let myLowongan = [];
        let currentLamaran = null;

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function getStatusClass(status) {
            const statusClasses = {
                'PENDING': 'bg-yellow-100 text-yellow-700',
                'DITERIMA': 'bg-green-100 text-green-700',
                'DITOLAK': 'bg-red-100 text-red-700'
            };
            return statusClasses[status] || 'bg-gray-100 text-gray-700';
        }

        function showLoading() {
            document.getElementById('lamaran-list').innerHTML = `
                <div class="flex justify-center items-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                </div>
            `;
        }

        // ============================================
        // FETCH DATA
        // ============================================
        async function fetchData() {
            try {
                showLoading();
                
                const [lowonganRes, lamaranRes] = await Promise.all([
                    fetch(`${API_URL}/perusahaan/lowongan`, {
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    }),
                    fetch(`${API_URL}/perusahaan/lamaran`, {
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    })
                ]);

                myLowongan = await lowonganRes.json();
                allLamaran = await lamaranRes.json();

                console.log('Lamaran data:', allLamaran); // Debug

                populateLowonganFilter();
                displayLamaran(allLamaran);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('lamaran-list').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center text-red-700">
                        Gagal memuat data lamaran
                    </div>
                `;
            }
        }

        // ============================================
        // DISPLAY FUNCTIONS
        // ============================================
        function populateLowonganFilter() {
            const select = document.getElementById('filter-lowongan');
            myLowongan.forEach(lowongan => {
                const option = document.createElement('option');
                option.value = lowongan.id;
                option.textContent = lowongan.judul;
                select.appendChild(option);
            });
        }

        function displayLamaran(lamaran) {
            const container = document.getElementById('lamaran-list');

            if (!lamaran || lamaran.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
                        Belum ada lamaran masuk
                    </div>
                `;
                return;
            }

            container.innerHTML = lamaran.map(item => `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-2">${item.mahasiswa?.nama || 'N/A'}</h3>
                            <p class="text-gray-600 mb-1">NIM: ${item.mahasiswa?.nim || '-'}</p>
                            <p class="text-gray-600 mb-1">${item.mahasiswa?.jurusan || '-'} - Semester ${item.mahasiswa?.semester || '-'}</p>
                            <p class="text-sm text-gray-500 mt-2">
                                <strong>Lowongan:</strong> ${item.lowongan?.judul || 'N/A'}
                            </p>
                            <p class="text-sm text-gray-500">
                                <strong>Tanggal Lamar:</strong> ${new Date(item.tanggalLamar).toLocaleDateString('id-ID')}
                            </p>
                        </div>
                        <span class="px-4 py-2 rounded font-semibold ${getStatusClass(item.status)}">
                            ${item.status}
                        </span>
                    </div>
                    <div class="mt-4">
                        <button onclick="viewDetail('${item.id}')" 
                            class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                            Lihat Detail
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function swalCountdown(options, seconds = 3) {
            return Swal.fire({
                ...options,
                timer: seconds * 1000,
                timerProgressBar: true,
            });
        }
        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        function viewDetail(id) {
            currentLamaran = allLamaran.find(l => l.id === id);
            if (!currentLamaran) return;

            console.log('Current lamaran:', currentLamaran); // Debug

            const mhs = currentLamaran.mahasiswa;

            // Build documents HTML
            let docsHTML = '';

            // CV Link (Google Drive/Dropbox)
            if (currentLamaran.cvLink) {
                docsHTML += `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <strong>CV (Link):</strong> 
                        <a href="${currentLamaran.cvLink}" target="_blank" class="text-blue-600 hover:underline">
                            Buka CV
                        </a>
                    </div>
                `;
            }

            // CV Uploaded File
            if (currentLamaran.cvFileName) {
                docsHTML += `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <strong>CV (Uploaded):</strong> 
                        <a href="${API_URL.replace('/api', '')}/uploads/cv/${currentLamaran.cvFileName}" class="text-blue-600 hover:underline">
                            ${currentLamaran.cvFileName}
                        </a>
                    </div>
                `;
            }

            // Portfolio Link
            if (currentLamaran.portfolioLink) {
                docsHTML += `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <strong>Portfolio:</strong> 
                        <a href="${currentLamaran.portfolioLink}" target="_blank" class="text-blue-600 hover:underline">
                            Lihat Portfolio
                        </a>
                    </div>
                `;
            }

            // LinkedIn Link
            if (currentLamaran.linkedinLink) {
                docsHTML += `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        <strong>LinkedIn:</strong> 
                        <a href="${currentLamaran.linkedinLink}" target="_blank" class="text-blue-600 hover:underline">
                            Buka Profil
                        </a>
                    </div>
                `;
            }

            // Resume/Additional Documents Link
            if (currentLamaran.resumeLink) {
                docsHTML += `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                        <strong>Dokumen Tambahan:</strong> 
                        <a href="${currentLamaran.resumeLink}" target="_blank" class="text-blue-600 hover:underline">
                            Lihat Dokumen
                        </a>
                    </div>
                `;
            }

            // If no documents at all
            if (!docsHTML) {
                docsHTML = '<p class="text-gray-500 text-sm italic">Tidak ada dokumen</p>';
            }

            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-6">
                    <!-- Informasi Mahasiswa -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-semibold text-gray-700 mb-3 flex items-center">
                            <span class="mr-2">👤</span>
                            Informasi Mahasiswa
                        </h4>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <p class="text-sm text-gray-600">Nama</p>
                                <p class="font-medium">${mhs?.nama || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">NIM</p>
                                <p class="font-medium">${mhs?.nim || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Jurusan</p>
                                <p class="font-medium">${mhs?.jurusan || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Semester</p>
                                <p class="font-medium">${mhs?.semester || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">IPK</p>
                                <p class="font-medium">${mhs?.ipk || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">No. Telepon</p>
                                <p class="font-medium">${mhs?.noTelp || '-'}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Dokumen Lamaran -->
                    <div class="bg-white border rounded-lg p-4">
                        <h4 class="font-semibold text-gray-700 mb-3 flex items-center">
                            Dokumen Lamaran
                        </h4>
                        ${docsHTML}
                    </div>

                    <!-- Info Lowongan -->
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <h4 class="font-semibold text-blue-900 mb-2">💼 Melamar untuk</h4>
                        <p class="text-blue-800 font-medium">${currentLamaran.lowongan?.judul || 'N/A'}</p>
                        <p class="text-sm text-blue-700 mt-1">Tanggal Lamar: ${new Date(currentLamaran.tanggalLamar).toLocaleDateString('id-ID', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        })}</p>
                    </div>
                </div>
            `;

            // Show/hide buttons based on status
            const approveBtn = document.getElementById('approve-btn');
            const rejectBtn = document.getElementById('reject-btn');
            
            if (currentLamaran.status !== 'PENDING') {
                approveBtn.style.display = 'none';
                rejectBtn.style.display = 'none';
            } else {
                approveBtn.style.display = 'block';
                rejectBtn.style.display = 'block';
            }

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        // ============================================
        // UPDATE STATUS FUNCTIONS
        // ============================================
        async function updateStatus(status) {
            if (!currentLamaran) return;

            // if (!confirm(`Yakin ingin ${status === 'DITERIMA' ? 'menerima' : 'menolak'} lamaran ini?`)) {
            //     return;
            // }

            const result = await Swal.fire({
                icon: 'warning',
                title: 'Konfirmasi',
                text: `Yakin ingin ${status === 'DITERIMA' ? 'menerima' : 'menolak'} lamaran ini?`,
                showCancelButton: true,
                confirmButtonColor: status === 'DITERIMA' ? '#3085d6' : '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Ya',
                cancelButtonText: 'Tidak'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/perusahaan/lamaran/${currentLamaran.id}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ status })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Gagal update status');
                }

                // alert(`Lamaran berhasil ${status === 'DITERIMA' ? 'diterima' : 'ditolak'}!`);
                await swalCountdown({
                    icon: 'success',
                    title: 'Berhasil',
                    text: `Lamaran berhasil ${status === 'DITERIMA' ? 'diterima' : 'ditolak'}`,
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'OK'
                }, 3);
                document.getElementById('detail-modal').classList.add('hidden');
                fetchData();
            } catch (error) {
                console.error('Error:', error);
                // alert('Error: ' + error.message);
                await swalCountdown({
                    icon: 'error',
                    title: 'Terjadi Kesalahan',
                    text: error.message,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'OK'
                }, 4);
            }
        }

        // ============================================
        // FILTER FUNCTIONS
        // ============================================
        function filterLamaran() {
            const lowonganId = document.getElementById('filter-lowongan').value;
            const status = document.getElementById('filter-status').value;

            const filtered = allLamaran.filter(item => {
                const matchLowongan = !lowonganId || item.lowonganId === lowonganId;
                const matchStatus = !status || item.status === status;
                return matchLowongan && matchStatus;
            });

            displayLamaran(filtered);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('approve-btn').addEventListener('click', () => updateStatus('DITERIMA'));
        document.getElementById('reject-btn').addEventListener('click', () => updateStatus('DITOLAK'));
        
        document.getElementById('filter-lowongan').addEventListener('change', filterLamaran);
        document.getElementById('filter-status').addEventListener('change', filterLamaran);

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('detail-modal').classList.add('hidden');
            currentLamaran = null;
        });

        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') {
                document.getElementById('detail-modal').classList.add('hidden');
                currentLamaran = null;
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        fetchData();
    </script>
</body>
</html>
