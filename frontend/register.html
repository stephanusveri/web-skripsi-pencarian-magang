<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sistem Magang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center py-8">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
            
            <div id="error-message" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
            
            <form id="register-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email *</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Password *</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-xs text-gray-500 mt-1">Minimal 6 karakter</p>
                </div>
                
                <!-- Fields untuk Mahasiswa -->
                <div id="mahasiswa-fields">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">NIM *</label>
                        <input type="text" id="nim" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Nama Lengkap *</label>
                        <input type="text" id="nama-mhs" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Jurusan *</label>
                        <select id="jurusan" required
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">--- Pilih Jurusan ---</option>
                            <option value="Sistem Informasi">Sistem Informasi</option>
                            <option value="Teknik Informatika">Teknik Informatika</option>
                            <option value="Manajemen">Manajemen</option>
                            <option value="Akuntansi">Akuntansi</option>
                            <option value="Ilmu Administrasi Bisnis">Ilmu Administrasi Bisnis</option>
                            <option value="Ilmu Komunikasi">Ilmu Komunikasi</option>
                            </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Semester *</label>
                        <input type="number" id="semester" required min="1" max="14"
                            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <button type="submit" 
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
                    Register
                </button>
            </form>
            
            <p class="mt-4 text-center text-gray-600">
                Sudah punya akun? 
                <a href="login.html" class="text-blue-500 hover:underline">Login</a>
            </p>
        </div>
    </div>

    <script>
        const apiUrl = 'http://localhost:5000/api';
        // const apiUrl = "https://f2g25jj2-5000.asse.devtunnels.ms/api"; // jika ingin di public ubah url jadi url forward port
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.add('hidden');
            
            const data = { 
                email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        role: 'MAHASISWA',
        nim: document.getElementById('nim').value,
        nama: document.getElementById('nama-mhs').value,
        jurusan: document.getElementById('jurusan').value, 
        semester: parseInt(document.getElementById('semester').value)        
    };
            
            try {
                const response = await fetch(`${apiUrl}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.message || 'Register gagal');
                }
                
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                
                alert('Register berhasil!');
                window.location.href = 'mahasiswa/dashboard.html';
                } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
